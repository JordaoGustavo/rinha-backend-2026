global
    maxconn 20000
    nbthread 1
    hard-stop-after 1s

# TCP mode: haproxy splices raw bytes between client and backend without
# parsing HTTP. Per-request CPU cost ~30µs vs ~150µs HTTP mode.
#
# HTTP mode was tried (commit prior) and crashed throughput in half
# because haproxy at 20% CPU became the bottleneck. TCP mode + small
# CFS period (10ms) restored echo P50 to 0.6ms.
#
# Trade-off: load-balancing is connection-level. HttpClient keep-alive
# connections stick to one backend. Acceptable since concurrent client
# connections roundrobin at connection-establishment time.
defaults
    mode tcp
    maxconn 20000
    timeout connect 50ms
    timeout client 5s
    timeout server 5s
    option splice-auto
    option dontlognull
    option tcpka
    no log

frontend rinha_front
    bind *:9999
    default_backend rinha_api

backend rinha_api
    balance roundrobin
    server api1 unix@/run/sock/api1.sock maxconn 10000
    server api2 unix@/run/sock/api2.sock maxconn 10000
