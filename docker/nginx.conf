worker_processes 1;
worker_rlimit_nofile 16384;

events {
    use epoll;
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    # Tight server defaults — drop chunked-encoding helpers we don't need.
    sendfile on;
    tcp_nopush off;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    # Persistent connections to upstream APIs via Unix sockets.
    # `keepalive 64` keeps up to 64 idle conns per worker — avoids handshake
    # cost on every request from nginx → kestrel.
    #
    # No load-balancer directive → nginx default is request-level round-robin
    # (rinha 2026 rule). Each request alternates api1 ↔ api2 regardless of
    # the upstream's current in-flight count.
    upstream rinha_api {
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
        keepalive 64;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 default_server backlog=4096 reuseport;
        listen [::]:9999 default_server backlog=4096;

        # No body/response buffering: forward as it arrives. Critical for
        # hot-path latency — buffering would add a copy + delay until the
        # full body lands.
        proxy_buffering off;
        proxy_request_buffering off;

        # HTTP/1.1 + empty Connection header → enables upstream keep-alive.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Tight timeouts; rinha targets are fast.
        proxy_connect_timeout 100ms;
        proxy_read_timeout    5s;
        proxy_send_timeout    5s;

        # Don't redirect / rewrite Host. Pass through as-is.
        proxy_redirect off;

        location / {
            proxy_pass http://rinha_api;
        }
    }
}
