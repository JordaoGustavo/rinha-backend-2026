services:
  haproxy:
    image: haproxy:3.1-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          # Bumped 8 MB → 16 MB after the submission run hit 5 http_errors
          # (~0.01 % failure, –180 detection pts). Hypothesis: 8 MB is tight
          # under burst with maxconn 20 000. Fits in 350 MB total budget by
          # trimming each API 165 → 162 MB (16 + 162 + 162 = 340 MB).
          memory: "16MB"
    depends_on:
      - api1
      - api2
    networks:
      - rinha

  api1:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SERVER_TIMING=${SERVER_TIMING:-0}
      - SOCKET_PATH=/run/sock/api1.sock
      # nprobe sweep w/ bbox-repair active: 8→5 saves another ~10µs/query at
      # 100% accuracy (lb-skip in the repair pass absorbs the loss). Floor at
      # nprobe=3; <3 inflates because the heap starts empty too long for the
      # repair pass to skip much.
      - NPROBE_FULL=5
      # Kestrel bypass: SocketHttpServer raw HTTP/1.1 sobre UDS.
      - CUSTOM_HTTP=1
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "1,2"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "162MB"
    networks:
      - rinha

  api2:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SERVER_TIMING=${SERVER_TIMING:-0}
      - SOCKET_PATH=/run/sock/api2.sock
      - NPROBE_FULL=5
      # Kestrel bypass: SocketHttpServer raw HTTP/1.1 sobre UDS.
      - CUSTOM_HTTP=1
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "162MB"
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
