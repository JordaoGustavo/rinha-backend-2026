services:
  haproxy:
    # sno-forevis: Rust+mio epoll TCP proxy (sem HTTP parsing). 531 KB
    # binário, ~24 MB imagem. Splice/byte-forward apenas — compatível com
    # SocketHttpServer raw HTTP/1.1 que será re-introduzido na próxima task.
    # Mantém o nome "haproxy" pra não quebrar deps internas do tester oficial.
    image: jrblatt/so-no-forevis:v0.0.2
    restart: always
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
    environment:
      - UPSTREAMS=/run/sock/api1.sock,/run/sock/api2.sock
      - PORT=9999
      - BUF_SIZE=4096
      - WORKERS=1
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          # 14 MB cabe (binário 531 KB + glibc + heap mio). Se subir 5xx
          # sob burst, devolve pra 16 MB e tira 2 MB de cada API.
          memory: "14MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    depends_on:
      - api1
      - api2
    networks:
      - rinha

  api1:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SERVER_TIMING=${SERVER_TIMING:-0}
      - SOCKET_PATH=/run/sock/api1.sock
      # nprobe sweep w/ bbox-repair active: 8→5 saves another ~10µs/query at
      # 100% accuracy (lb-skip in the repair pass absorbs the loss). Floor at
      # nprobe=3; <3 inflates because the heap starts empty too long for the
      # repair pass to skip much.
      - NPROBE_FULL=5
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "1,2"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "162MB"
    networks:
      - rinha

  api2:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SERVER_TIMING=${SERVER_TIMING:-0}
      - SOCKET_PATH=/run/sock/api2.sock
      - NPROBE_FULL=5
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "162MB"
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
