services:
  haproxy:
    image: haproxy:3.1-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "8MB"
    depends_on:
      - api1
      - api2
    networks:
      - rinha

  api1:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SOCKET_PATH=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "1,2"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    networks:
      - rinha

  api2:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SOCKET_PATH=/run/sock/api2.sock
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
