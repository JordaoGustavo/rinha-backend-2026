# CFS bandwidth control:
#   Total CPU budget = 1.0 (0.20 + 0.40 + 0.40) — kept under rinha 1-CPU limit.
#
#   We use cpu_period=10000us (10ms) instead of the default 100ms so that
#   when a container exhausts its quota, the worst-case throttle wait is
#   ~9ms instead of ~90ms. Same total bandwidth, much shorter P99 tail.
#
#   quota / period = bandwidth percentage:
#     haproxy:  2000 / 10000 = 20%   (matches Jairo's setup; with TCP-mode
#                                    haproxy this is comfortable headroom)
#     api1/2:   4000 / 10000 = 40%
#     total                  = 100% of 1 CPU (rinha limit respected)
#
#   The previous 0.10/0.45/0.45 split had haproxy throttling under load
#   (its 1ms quota was burned in <5ms wall-clock by ~10 concurrent requests
#   in HTTP mode); shifting CPU to the LB + switching haproxy to TCP mode
#   eliminates that bottleneck.
#
#   NOTE: cpus: and cpu_period/cpu_quota are mutually exclusive in Docker
#   (NanoCPUs vs explicit cgroup), so the cpus: limit is omitted; the
#   effective limit is defined by quota/period (verifiable via
#   `docker exec <container> cat /sys/fs/cgroup/cpu.max`).

services:
  haproxy:
    image: haproxy:3.1-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    # haproxy: dedicated to core 0 — TCP-mode forwarding is cheap enough
    # that 20% of 1 core is comfortable; isolating from APIs eliminates
    # L1/L2 cache pollution on hot paths.
    cpuset: "0"
    cpu_period: 10000
    cpu_quota:   2000
    deploy:
      resources:
        limits:
          memory: "8MB"
    depends_on:
      - api1
      - api2
    networks:
      - rinha

  api1:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SOCKET_PATH=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    # api1: cores 1,2 — 2 cores allow concurrent requests to spread under
    # bursts; bandwidth still capped at 40% of 1 CPU. Disjoint from haproxy.
    cpuset: "1,2"
    cpu_period: 10000
    cpu_quota:   4000
    deploy:
      resources:
        limits:
          memory: "165MB"
    networks:
      - rinha

  api2:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - EXACT_PATH=${EXACT_PATH:-/data/exact.bin}
      - SOCKET_PATH=/run/sock/api2.sock
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    # api2: cores 2,3 — overlaps with api1 only on core 2. Combined bandwidth
    # of api1+api2 on core 2 is at most 45%+45% = 90% of 1 core ≤ 1 core, so
    # no oversubscription; scheduler picks whichever has waiting work.
    cpuset: "2,3"
    cpu_period: 10000
    cpu_quota:   4000
    deploy:
      resources:
        limits:
          memory: "165MB"
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
