# Variant: nginx as LB instead of haproxy.
#
# Mirrors docker-compose.yml exactly (same CPU/memory budget, same Unix
# sockets, same 10ms CFS period) — only the LB binary differs. Lets us
# A/B nginx vs haproxy under identical conditions.
#
# Diff from main compose:
#   - haproxy service → nginx service (nginx:1.27-alpine, ~5MB working set)
#   - mounts nginx.conf instead of haproxy.cfg
#   - 30MB memory limit for nginx (vs 10MB for haproxy)
#
# CPU split: 0.20 / 0.40 / 0.40 = 1.0 (rinha rule respected).

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    cpuset: "0"
    cpu_period: 10000
    cpu_quota:   2000
    deploy:
      resources:
        limits:
          memory: "30MB"
    depends_on:
      - api1
      - api2
    networks:
      - rinha

  api1:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - SOCKET_PATH=/run/sock/api1.sock
      - DEBUG_TCP_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "1,2"
    cpu_period: 10000
    cpu_quota:   4000
    deploy:
      resources:
        limits:
          memory: "170MB"
    networks:
      - rinha

  api2:
    image: rinha/api:latest
    security_opt:
      - seccomp=unconfined
    environment:
      - INDEX_PATH=${INDEX_PATH:-/data/ivf.bin}
      - SOCKET_PATH=/run/sock/api2.sock
    volumes:
      - sock:/run/sock
      - ../data:/data:ro
    cpuset: "2,3"
    cpu_period: 10000
    cpu_quota:   4000
    deploy:
      resources:
        limits:
          memory: "170MB"
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
