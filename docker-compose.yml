# Submission compose for the rinha-de-backend-2026 official engine.
# Resources match the rinha rules: 1 CPU and 350 MB total; 1 LB + 2 API
# replicas; bridge network; port 9999; no business logic on the LB.
#
# CPU split: LB 0.15 + API 0.425 × 2 = 1.00. so-no-forevis at TCP splice
# uses ~30µs/req — 0.15 CPU is plenty at 900 req/s peak. Extra 0.025/API
# reduces CFS throttle probability on IVF queries.

services:
  lb:
    image: jrblatt/so-no-forevis:v0.0.2
    pull_policy: always
    restart: always
    depends_on:
      - api1
      - api2
    environment:
      - UPSTREAMS=/run/sock/api1.sock,/run/sock/api2.sock
      - PORT=9999
      - BUF_SIZE=4096
      - WORKERS=1
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "40MB"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha

  api1:
    image: ghcr.io/jordaogustavo/rinha-api:latest
    pull_policy: always
    environment:
      - SOCKET_PATH=/run/sock/api1.sock
      - CUSTOM_HTTP=1
      - NPROBE_FULL=5
      - UNANIMITY_SKIP=1
      - PROFILE_MIN_COUNT=15
    volumes:
      - sock:/run/sock
    cpuset: "1,2"
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "155MB"
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha

  api2:
    image: ghcr.io/jordaogustavo/rinha-api:latest
    pull_policy: always
    environment:
      - SOCKET_PATH=/run/sock/api2.sock
      - CUSTOM_HTTP=1
      - NPROBE_FULL=5
      - UNANIMITY_SKIP=1
      - PROFILE_MIN_COUNT=15
    volumes:
      - sock:/run/sock
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "155MB"
    security_opt:
      - seccomp:unconfined
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
