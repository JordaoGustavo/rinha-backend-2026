# Submission compose for the rinha-de-backend-2026 official engine.
# All resources (CPU, memory, image) match the rinha rules:
#   * 1 CPU total, 350 MB total
#   * 1 LB + 2 API replicas, bridge network, port 9999
#   * No fraud-detection logic on the LB (haproxy in TCP mode)
#
# CFS bandwidth control: cpu_period=10000us (10ms) instead of the default
# 100ms shrinks worst-case throttle wait from ~90ms to ~9ms — same total
# bandwidth, much shorter P99 tail.

services:
  haproxy:
    image: haproxy:3.1-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    cpuset: "0"
    cpu_period: 10000
    cpu_quota:   2000
    deploy:
      resources:
        limits:
          memory: "8MB"
    depends_on:
      - api1
      - api2
    networks:
      - rinha

  api1:
    # TODO: replace with the published public image (e.g. ghcr.io/jordaogustavo/rinha-api:v1).
    image: ghcr.io/jordaogustavo/rinha-api:latest
    environment:
      - SOCKET_PATH=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
    cpuset: "1,2"
    cpu_period: 10000
    cpu_quota:   4000
    deploy:
      resources:
        limits:
          memory: "165MB"
    networks:
      - rinha

  api2:
    image: ghcr.io/jordaogustavo/rinha-api:latest
    environment:
      - SOCKET_PATH=/run/sock/api2.sock
    volumes:
      - sock:/run/sock
    cpuset: "2,3"
    cpu_period: 10000
    cpu_quota:   4000
    deploy:
      resources:
        limits:
          memory: "165MB"
    networks:
      - rinha

volumes:
  sock:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1m,nr_inodes=8,mode=0777,noatime,nosuid,nodev"

networks:
  rinha:
    driver: bridge
